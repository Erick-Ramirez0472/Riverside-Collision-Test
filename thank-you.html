<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You | Riverside Collision Repair</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0a0a0a;
      color: #ffffff;
      font-family: Arial, Helvetica, sans-serif;
      padding: 24px;
      text-align: center;
    }
    .card {
      width: min(560px, 100%);
      background: #1a1a1a;
      border: 1px solid rgba(255,255,255,0.1);
      border-top: 3px solid #3ad4f5;
      padding: 36px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 8vw, 3rem);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    p {
      color: #cfcfcf;
      line-height: 1.6;
      margin: 0 0 24px;
    }
    a {
      display: inline-block;
      background: #d42b2b;
      color: #ffffff;
      text-decoration: none;
      padding: 13px 24px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Thank You</h1>
    <p>Your quote request was submitted. We will review your photos and repair details as soon as possible.</p>
    <a href="index.html">Back to Home</a>
  </div>
</body>
</html>
